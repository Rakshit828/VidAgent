
services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vidagent_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  api:
    build: .
    container_name: api
    working_dir: /contenerization
    command: bash -c "alembic upgrade head && fastapi run src"
    env_file:
      - ./.env.docker
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
  
  inngest:
    image: inngest/inngest:latest
    container_name: inngest-dev
    env_file:
      - .env.docker
    command: >
      inngest dev
      -u http://api:8000/api/inngest
    ports:
      - "8288:8288"
      - "8289:8289"
    depends_on:
      - api
    restart: unless-stopped



volumes:
  postgres-data:
  redis-data: